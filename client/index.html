<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion Restaurante</title>
</head>

<body>
    <div id="root">
        <style>
            .app-loading-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: fixed;
                inset: 0;
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                color: #ffffff;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                z-index: 9999;
            }
            .app-loading-logo {
                font-size: 2.5rem;
                font-weight: 800;
                letter-spacing: -0.05em;
                color: #3b82f6;
                text-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
                margin-bottom: 2rem;
                animation: app-pulse 2s infinite ease-in-out;
            }
            .app-loading-spinner {
                width: 3.5rem;
                height: 3.5rem;
                border: 4px solid rgba(255, 255, 255, 0.1);
                border-left-color: #3b82f6;
                border-radius: 50%;
                animation: app-spin 1s linear infinite;
            }
            .app-loading-text {
                margin-top: 1.5rem;
                font-size: 0.875rem;
                font-weight: 600;
                color: #94a3b8;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                animation: app-fade 1.5s infinite alternate;
            }
            @keyframes app-spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            @keyframes app-pulse {
                0%, 100% { transform: scale(1); opacity: 0.9; }
                50% { transform: scale(1.05); opacity: 1; text-shadow: 0 4px 30px rgba(59, 130, 246, 0.6); }
            }
            @keyframes app-fade {
                0% { opacity: 0.4; }
                100% { opacity: 0.9; }
            }
        </style>
        <div class="app-loading-container">
            <div class="app-loading-logo">Makala</div>
            <div class="app-loading-spinner"></div>
            <div class="app-loading-text">Preparando tu mesa...</div>
        </div>
    </div>
    <script>
        window.onerror = function (message, source, lineno, colno, error) {
            document.body.innerHTML += `<div style="color:red; background:white; padding:10px; border:1px solid red; margin:10px;">
                <h3>Global Error</h3>
                <p>${message}</p>
                <p>Source: ${source}:${lineno}</p>
            </div>`;
        };
    </script>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
