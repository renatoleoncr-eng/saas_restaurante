# =============================================
# Nginx Configuration — Multi-SaaS Wildcard
# =============================================
# Handles:
# - *.maksuites.com.pe → proxies to the Node.js app
# - maksuites.com.pe (no subdomain) → also proxies to the app (landing page)
# - WebSocket proxy for Socket.IO
# - SSL termination with Let's Encrypt wildcard certificate

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=register:10m rate=5r/m;

# Upstream
upstream restaurante_app {
    server app:3004;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name maksuites.com.pe *.maksuites.com.pe;
    return 301 https://$host$request_uri;
}

# HTTPS — Main domain + Wildcard subdomains
server {
    listen 443 ssl http2;
    server_name maksuites.com.pe *.maksuites.com.pe;

    # SSL Certificates (Let's Encrypt wildcard)
    ssl_certificate /etc/letsencrypt/live/maksuites.com.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maksuites.com.pe/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for images, payment evidence, etc.)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # API routes
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://restaurante_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Registration rate limiting (stricter)
    location /api/tenants/register {
        limit_req zone=register burst=3 nodelay;
        proxy_pass http://restaurante_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO WebSocket
    location /socket.io/ {
        proxy_pass http://restaurante_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://restaurante_app;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets (cached)
    location /assets/ {
        proxy_pass http://restaurante_app;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → SPA
    location / {
        proxy_pass http://restaurante_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
